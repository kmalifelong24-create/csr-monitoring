let currentTab = 'all', companyFilter = 'all';

function setTab(t, el) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  renderFeed();
}

function setCompanyFilter(f, el) {
  companyFilter = f;
  document.querySelectorAll('.f-btn').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
  renderCompanies();
}

function statusBadge(item) {
  if (item.status === 'open') return '<span class="badge badge-open">🟢 모집 중</span>';
  if (item.status === 'closed') return '<span class="badge badge-closed">🔴 마감</span>';
  return '';
}

function typeBadge(type) {
  if (type === 'recruit') return '<span class="badge badge-recruit">📢 모집·공모</span>';
  if (type === 'tender') return '<span class="badge badge-tender">📑 입찰</span>';
  return '<span class="badge badge-news">📰 뉴스</span>';
}

function renderItem(f) {
  return `<div class="news-item">
    <div class="news-badges">${typeBadge(f.type)}${statusBadge(f)}</div>
    <div class="news-company">${f.isNew ? '<span class="new-dot"></span>' : ''}${f.company}</div>
    <div class="news-title">${f.title}</div>
    <div class="news-summary">${f.summary}</div>
    ${f.trackNote ? `<div class="track-box">
      <div class="track-label">🔮 추적 가이드</div>
      <div class="track-text">${f.trackNote}</div>
      ${f.trackWhen ? `<div class="track-when">⏰ ${f.trackWhen}</div>` : ''}
    </div>` : ''}
    <div class="news-meta">
      <span class="news-date">수집: ${f.date}</span>
      ${f.deadline ? (f.status === 'open'
        ? `<span class="deadline-open">마감 ${f.deadline}</span>`
        : `<span class="deadline-closed">마감 ${f.deadline}</span>`) : ''}
      ${f.url ? `<a class="news-link" href="${f.url}" target="_blank">🔗 원문</a>` : ''}
    </div>
  </div>`;
}

function renderFeed() {
  const feed = document.getElementById('newsFeed');

  if (currentTab === 'archive') {
    if (!ARCHIVE.length) {
      feed.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>아직 아카이브된 기록이 없습니다.<br>7일이 지난 뉴스가 자동으로 여기 쌓입니다.</p></div>';
      document.getElementById('feedCount').textContent = '0건';
      return;
    }
    const total = ARCHIVE.reduce((s, w) => s + w.items.length, 0);
    document.getElementById('feedCount').textContent = total + '건';
    feed.innerHTML = ARCHIVE.map(week => `
      <div class="archive-week">
        <div class="archive-week-header" onclick="toggleWeek(this)">
          📅 ${week.week}
          <span class="week-count">${week.items.length}건</span>
          <span class="toggle-icon">▶</span>
        </div>
        <div class="archive-week-body" style="display:none">
          ${week.items.map(f => renderItem(f)).join('')}
        </div>
      </div>`).join('');
    return;
  }

  let data = [...FINDINGS];
  if (currentTab === 'open')    data = data.filter(f => f.status === 'open');
  if (currentTab === 'recruit') data = data.filter(f => f.type === 'recruit');
  if (currentTab === 'track')   data = data.filter(f => f.trackNote);
  if (currentTab === 'news')    data = data.filter(f => f.type === 'news');
  data.sort((a, b) => ({open:0,closed:1,news:2}[a.status]||2) - ({open:0,closed:1,news:2}[b.status]||2));

  document.getElementById('feedCount').textContent = data.length + '건';
  if (!data.length) {
    feed.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>수집된 공고가 없습니다.<br>매일 오전 9시 자동 스캔됩니다.</p></div>';
    return;
  }
  feed.innerHTML = data.map(f => renderItem(f)).join('');
}

function toggleWeek(header) {
  const body = header.nextElementSibling;
  const icon = header.querySelector('.toggle-icon');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  icon.textContent = isOpen ? '▶' : '▼';
}

function renderCompanies() {
  const q = document.getElementById('companySearch').value.trim();
  const withNews = new Set(FINDINGS.map(f => f.company));
  let list = [...COMPANIES];
  if (q) list = list.filter(c => c.name.includes(q));
  if (companyFilter === 'high') list = list.filter(c => c.priority === 'high');
  if (companyFilter === 'cond') list = list.filter(c => c.priority === 'cond');
  if (companyFilter === 'news') list = list.filter(c => withNews.has(c.name));
  list.sort((a, b) => (withNews.has(a.name) ? 0 : 1) - (withNews.has(b.name) ? 0 : 1));
  document.getElementById('companyList').innerHTML = list.map(c => {
    const cnt = FINDINGS.filter(f => f.company === c.name).length;
    const dot = c.priority === 'high' ? 'p-high' : c.priority === 'cond' ? 'p-cond' : 'p-low';
    return `<div class="company-row ${cnt ? 'has-news' : ''}" onclick="filterByCompany('${c.name.replace(/'/g,"\\'")}')">
      <div class="priority-dot ${dot}"></div>
      <div class="company-name-text" title="${c.name}">${c.name}</div>
      ${cnt ? `<div class="company-news-count">${cnt}</div>` : ''}
    </div>`;
  }).join('');
}

function filterByCompany(name) {
  const data = FINDINGS.filter(f => f.company === name);
  if (!data.length) return;
  document.querySelectorAll('.tab').forEach(e => e.classList.remove('active'));
  document.getElementById('feedCount').textContent = data.length + '건';
  document.getElementById('newsFeed').innerHTML = data.map(f => renderItem(f)).join('');
}

function updateStats() {
  document.getElementById('sOpen').textContent = FINDINGS.filter(f => f.status === 'open').length;
  document.getElementById('sRecruit').textContent = FINDINGS.filter(f => f.type === 'recruit').length;
  document.getElementById('sTrack').textContent = FINDINGS.filter(f => f.trackNote).length;
  document.getElementById('sNews').textContent = FINDINGS.filter(f => f.type === 'news').length;
  const dates = FINDINGS.map(f => f.date).filter(Boolean).sort();
  document.getElementById('lastScan').textContent = dates.length ? dates[dates.length - 1] : '아직 없음';
}

updateStats(); renderFeed(); renderCompanies();
</script>
</body>
</html>
