name: CSR 공고 모니터링 자동 업데이트

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 매주 월~금 오전 9시 (KST = UTC+9, 0시 UTC)
  workflow_dispatch:          # GitHub 웹에서 수동 실행 버튼

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # index.html 커밋 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install feedparser

      - name: CSR 뉴스 수집 및 대시보드 업데이트
        run: python update_dashboard.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --global user.name 'CSR Monitor Bot'
          git config --global user.email 'csr-bot@github-actions'
          git add index.html
          git diff --staged --quiet && echo "변경사항 없음" || (
            git commit -m "🤖 Auto-update: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST"
            git push
          )
